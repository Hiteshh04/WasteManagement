<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: absolute;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-log').innerText += message + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-log').innerText += 'Unhandled Promise Rejection: ' + event.reason + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '\n\n';
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
